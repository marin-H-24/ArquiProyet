name: Generar APK de ARQUIPROYET

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Copia tu código a la máquina virtual
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # 2. Prepara el entorno con Java
      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Le da permisos al motor de Android (Gradle) para ejecutarse
      - name: Configurar permisos de ejecución de Gradle
        run: chmod +x gradlew

      # 4. Compila todo el código y genera la APK en modo Debug
      - name: Construir la APK
        run: ./gradlew assembleDebug

      # 5. Agarra el archivo final y te lo deja disponible para descargar
      - name: Guardar la APK generada
        uses: actions/upload-artifact@v4
        with:
          name: ARQUIPROYET-X-APK
          path: app/build/outputs/apk/debug/app-debug.apk